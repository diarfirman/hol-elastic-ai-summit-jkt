<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Elastic Agent Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #22242C; font-family: 'Inter', -apple-system, sans-serif; }
#slide-wrapper { position: absolute; width: 1280px; height: 720px; transform-origin: top left; }
#slide-frame { position: absolute; inset: 0; width: 1280px; height: 720px; border: none; display: block; }
#transition-fade { position: absolute; inset: 0; background: #22242C; opacity: 0; transition: opacity 0.18s ease; pointer-events: none; z-index: 6; }

.preso-nav {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; align-items: center; gap: 0.25rem; z-index: 9999;
  background: rgba(34,36,44,0.88); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 40px; padding: 0.3rem 0.45rem;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.preso-nav.nav-hidden { opacity: 0; pointer-events: none; transform: translateY(6px); }
.nav-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  color: rgba(255,255,255,0.7); cursor: pointer; background: transparent; border: none;
  transition: background 0.15s, color 0.15s;
}
.nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
.nav-btn.active { background: rgba(56,189,248,0.15); color: #38BDF8; }
.nav-btn svg { width: 13px; height: 13px; }
.nav-btn:disabled { opacity: 0.2; cursor: default; }
.nav-btn:disabled:hover { background: transparent; color: rgba(255,255,255,0.7); }
.nav-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.1); margin: 0 0.1rem; }
.nav-counter { font-size: 0.88rem; font-weight: 800; color: #0B5FFF; letter-spacing: 0.03em; padding: 0 0.35rem; user-select: none; }
.nav-logo { width: 22px; height: 22px; border-radius: 5px; display: block; flex-shrink: 0; margin-left: 0.1rem; object-fit: cover; }

#filmstrip {
  position: fixed; bottom: 0; left: 0; right: 0; height: 114px;
  background: rgba(13,15,20,0.97); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.08); z-index: 8890;
  transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.2,0,0.2,1);
}
#filmstrip.open { transform: translateY(0); }
#filmstrip-track {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 20px; height: 100%;
  overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth;
}
#filmstrip-track::-webkit-scrollbar { height: 3px; }
#filmstrip-track::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
.fs-thumb {
  flex-shrink: 0; position: relative; width: 160px; height: 90px;
  border-radius: 6px; overflow: hidden;
  border: 2px solid rgba(255,255,255,0.07); cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
}
.fs-thumb:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
.fs-thumb.current { border-color: #38BDF8; box-shadow: 0 0 0 1px #38BDF8, 0 4px 16px rgba(56,189,248,0.3); }
.fs-thumb-inner { position: absolute; top: 0; left: 0; width: 1280px; height: 720px; transform: scale(0.125); transform-origin: top left; pointer-events: none; }
.fs-thumb-inner iframe { width: 1280px; height: 720px; border: none; display: block; }
.fs-num { position: absolute; bottom: 3px; right: 5px; font-size: 0.5rem; font-weight: 700; color: rgba(255,255,255,0.3); user-select: none; }
.fs-thumb.current .fs-num { color: rgba(56,189,248,0.7); }

#overview {
  position: fixed; inset: 0; z-index: 8888;
  background: rgba(15,17,22,0.96); backdrop-filter: blur(20px);
  display: none; flex-direction: column; opacity: 0; transition: opacity 0.2s ease;
}
#overview.open { display: flex; }
#overview.visible { opacity: 1; }
.ov-header {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.07);
}
.ov-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
.ov-hint { font-size: 0.62rem; color: rgba(255,255,255,0.2); }
.ov-grid {
  flex: 1; overflow-y: auto; padding: 1.2rem 2rem 1.5rem;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; align-content: start;
}
.ov-grid::-webkit-scrollbar { width: 6px; }
.ov-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.ov-thumb {
  cursor: pointer; border-radius: 8px; overflow: hidden;
  border: 2px solid rgba(255,255,255,0.07); background: #1a1c22;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
}
.ov-thumb:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.ov-thumb.current { border-color: #38BDF8; box-shadow: 0 0 0 1px #38BDF8, 0 8px 24px rgba(56,189,248,0.2); }
.ov-frame-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; pointer-events: none; }
.ov-frame-wrap iframe { position: absolute; top: 0; left: 0; width: 1280px; height: 720px; border: none; transform-origin: top left; pointer-events: none; }
.ov-label {
  padding: 5px 9px; font-size: 0.6rem; font-weight: 600;
  color: rgba(255,255,255,0.35); letter-spacing: 0.04em;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.ov-thumb.current .ov-label { color: #38BDF8; }
.ov-num { font-size: 0.58rem; color: rgba(255,255,255,0.18); }
.ov-thumb.current .ov-num { color: rgba(56,189,248,0.5); }

#notes-panel {
  position: fixed; bottom: 0; left: 0; right: 0; height: 180px;
  background: rgba(10,12,18,0.97); backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.08); z-index: 8880;
  transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.2,0,0.2,1);
  display: flex; flex-direction: column;
}
#notes-panel.open { transform: translateY(0); }
.notes-header {
  flex-shrink: 0; display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.notes-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.notes-slide-name { font-size: 10px; color: rgba(255,255,255,0.18); font-style: italic; }
#notes-textarea {
  flex: 1; width: 100%; background: transparent; border: none; outline: none; resize: none;
  color: rgba(255,255,255,0.65); font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; line-height: 1.6;
  padding: 12px 20px;
}
#notes-textarea::placeholder { color: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<div id="filmstrip"><div id="filmstrip-track"></div></div>

<div id="overview">
  <div class="ov-header">
    <span class="ov-title">Slide Overview</span>
    <span class="ov-hint">Click to jump · G or Esc to close</span>
  </div>
  <div class="ov-grid" id="ov-grid"></div>
</div>

<div id="notes-panel">
  <div class="notes-header">
    <span class="notes-label">Speaker Notes</span>
    <span class="notes-slide-name" id="notes-slide-name"></span>
  </div>
  <textarea id="notes-textarea" placeholder="Presenter notes..."></textarea>
</div>

<div id="slide-wrapper">
  <iframe id="slide-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  <div id="transition-fade"></div>
</div>

<div class="preso-nav" id="preso-nav">
  <button class="nav-btn" id="btn-prev" disabled title="Previous (←)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-counter" id="nav-counter">1 / 1</span>
  <button class="nav-btn" id="btn-next" title="Next (→)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="nav-sep"></div>
  <button class="nav-btn" id="btn-ov" title="Overview (G)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </button>
  <button class="nav-btn" id="btn-fs2" title="Filmstrip (T)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="4" height="10"/><rect x="8" y="7" width="8" height="10"/><rect x="18" y="7" width="4" height="10"/></svg>
  </button>
  <button class="nav-btn" id="btn-notes" title="Notes (N)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
  </button>
  <div class="nav-sep"></div>
  <button class="nav-btn" id="btn-presenter" title="Presenter View (P)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="17" cy="8" r="2" fill="currentColor" stroke="none" opacity="0.5"/></svg>
  </button>
  <button class="nav-btn" id="btn-fs" title="Fullscreen (F)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>
  <img class="nav-logo" src="https://www.elastic.co/favicon.svg" alt="Elastic">
</div>

<script>
'use strict';

const SLIDE_KEYS   = ['s01','s02','s03','s04','s09','s05','s06','s07','s08'];
const SLIDE_LABELS = ['Cover','What Is It','Key Capabilities','Key Concepts','Component Interaction','Model Selection','Programmatic Interfaces','Permissions & Ops','Get Started'];
const NOTES_KEY    = 'elastic-agent-builder-deck-notes';

const SLIDES_CONTENTS = {};

let idx = parseInt(location.hash.slice(1)) || 0;
if (idx < 0 || idx >= SLIDE_KEYS.length) idx = 0;

const slideWrapper   = document.getElementById('slide-wrapper');
const frame          = document.getElementById('slide-frame');
const transitionFade = document.getElementById('transition-fade');
const counter        = document.getElementById('nav-counter');
const btnPrev        = document.getElementById('btn-prev');
const btnNext        = document.getElementById('btn-next');
const btnFs          = document.getElementById('btn-fs');
const btnOv          = document.getElementById('btn-ov');
const btnFs2         = document.getElementById('btn-fs2');
const btnNotes       = document.getElementById('btn-notes');
const presoNav       = document.getElementById('preso-nav');
const filmstrip      = document.getElementById('filmstrip');
const fsTrack        = document.getElementById('filmstrip-track');
const overview       = document.getElementById('overview');
const ovGrid         = document.getElementById('ov-grid');
const notesPanel     = document.getElementById('notes-panel');
const notesTextarea  = document.getElementById('notes-textarea');
const notesSlideName = document.getElementById('notes-slide-name');

let firstLoad = true;
let ovOpen = false, fsOpen = false, notesOpen = false;
let ovBuilt = false, fsBuilt = false;

function loadNotes() { try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '{}'); } catch(_) { return {}; } }
function saveNotes(data) { try { localStorage.setItem(NOTES_KEY, JSON.stringify(data)); } catch(_) {} }
let allNotes = loadNotes();
let notesSaveTimer = null;

function loadNotesForSlide() {
  notesSlideName.textContent = SLIDE_LABELS[idx] || SLIDE_KEYS[idx];
  notesTextarea.value = allNotes[SLIDE_KEYS[idx]] || '';
}

function go(newIdx) {
  const i = Math.max(0, Math.min(SLIDE_KEYS.length - 1, newIdx));
  idx = i;
  location.replace('#' + idx);
  counter.textContent = (idx + 1) + ' / ' + SLIDE_KEYS.length;
  btnPrev.disabled = idx <= 0;
  btnNext.disabled = idx >= SLIDE_KEYS.length - 1;
  if (notesOpen) loadNotesForSlide();
  const load = () => { frame.srcdoc = SLIDES_CONTENTS[SLIDE_KEYS[idx]] || ''; };
  if (!firstLoad) {
    transitionFade.style.opacity = '1';
    setTimeout(() => { load(); requestAnimationFrame(() => requestAnimationFrame(() => { transitionFade.style.opacity = '0'; })); }, 160);
  } else { load(); firstLoad = false; }
  if (ovBuilt) updateOvHighlight();
  if (fsBuilt) updateFsHighlight();
  setTimeout(() => { if (presenterCh) broadcastPresenterState(); }, 200);
}

function buildOverview() {
  if (ovBuilt) return; ovBuilt = true;
  SLIDE_KEYS.forEach((key, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'ov-thumb' + (i === idx ? ' current' : '');
    thumb.dataset.i = i;
    const wrap = document.createElement('div'); wrap.className = 'ov-frame-wrap';
    const fr = document.createElement('iframe'); fr.setAttribute('scrolling', 'no');
    const ro = new ResizeObserver(entries => {
      for (const e of entries) { const s = e.contentRect.width / 1280; fr.style.transform = `scale(${s})`; wrap.style.height = (720 * s) + 'px'; } ro.disconnect();
    }); ro.observe(wrap); wrap.appendChild(fr);
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (!e.isIntersecting) return;
        const FREEZE = '<style>*,*::before,*::after{animation-duration:0.001ms!important;transition-duration:0ms!important;}</style>';
        fr.srcdoc = (SLIDES_CONTENTS[key] || '').replace(/<script\b[\s\S]*?<\/script>/gi, '').replace('</head>', FREEZE + '</head>');
        obs.unobserve(e.target); });
    }, { root: ovGrid, rootMargin: '80px' }); obs.observe(thumb);
    const lbl = document.createElement('div'); lbl.className = 'ov-label';
    lbl.innerHTML = `<span>${SLIDE_LABELS[i] || key}</span><span class="ov-num">${i + 1}</span>`;
    thumb.appendChild(wrap); thumb.appendChild(lbl);
    thumb.addEventListener('click', () => { go(i); closeOverview(); });
    ovGrid.appendChild(thumb);
  });
}
function updateOvHighlight() {
  ovGrid.querySelectorAll('.ov-thumb').forEach(el => el.classList.toggle('current', parseInt(el.dataset.i) === idx));
  const cur = ovGrid.querySelector('.ov-thumb.current'); if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}
function openOverview()  { if (fsOpen) closeFilmstrip(); if (notesOpen) closeNotes(); ovOpen = true; buildOverview(); overview.style.display = 'flex'; btnOv.classList.add('active'); requestAnimationFrame(() => { overview.classList.add('visible'); updateOvHighlight(); }); }
function closeOverview() { ovOpen = false; overview.classList.remove('visible'); btnOv.classList.remove('active'); setTimeout(() => { overview.style.display = 'none'; }, 200); }
function toggleOverview() { ovOpen ? closeOverview() : openOverview(); }

function buildFilmstrip() {
  if (fsBuilt) return; fsBuilt = true;
  const FREEZE = '<style>*,*::before,*::after{animation-duration:0.001ms!important;transition-duration:0ms!important;}</style>';
  SLIDE_KEYS.forEach((key, i) => {
    const thumb = document.createElement('div'); thumb.className = 'fs-thumb' + (i === idx ? ' current' : ''); thumb.dataset.i = i;
    const inner = document.createElement('div'); inner.className = 'fs-thumb-inner';
    const fr = document.createElement('iframe'); fr.setAttribute('scrolling', 'no');
    fr.srcdoc = (SLIDES_CONTENTS[key] || '').replace(/<script\b[\s\S]*?<\/script>/gi, '').replace('</head>', FREEZE + '</head>');
    inner.appendChild(fr);
    const num = document.createElement('div'); num.className = 'fs-num'; num.textContent = i + 1;
    thumb.appendChild(inner); thumb.appendChild(num);
    thumb.addEventListener('click', () => go(i));
    fsTrack.appendChild(thumb);
  });
}
function updateFsHighlight() {
  fsTrack.querySelectorAll('.fs-thumb').forEach((el, i) => el.classList.toggle('current', i === idx));
  const cur = fsTrack.querySelector('.fs-thumb.current'); if (cur) cur.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
}
function openFilmstrip()  { if (ovOpen) closeOverview(); if (notesOpen) closeNotes(); fsOpen = true; buildFilmstrip(); filmstrip.classList.add('open'); btnFs2.classList.add('active'); updateFsHighlight(); }
function closeFilmstrip() { fsOpen = false; filmstrip.classList.remove('open'); btnFs2.classList.remove('active'); }
function toggleFilmstrip() { fsOpen ? closeFilmstrip() : openFilmstrip(); }

function openNotes()  { if (ovOpen) closeOverview(); if (fsOpen) closeFilmstrip(); notesOpen = true; loadNotesForSlide(); notesPanel.classList.add('open'); btnNotes.classList.add('active'); }
function closeNotes() { notesOpen = false; notesPanel.classList.remove('open'); btnNotes.classList.remove('active'); }
function toggleNotes() { notesOpen ? closeNotes() : openNotes(); }

document.addEventListener('keydown', e => {
  if (e.target === notesTextarea) { if (e.key === 'Escape') { e.preventDefault(); closeNotes(); } return; }
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === 'g' || e.key === 'G') { e.preventDefault(); toggleOverview(); return; }
  if (e.key === 't' || e.key === 'T') { e.preventDefault(); toggleFilmstrip(); return; }
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); toggleNotes(); return; }
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); btnFs.click(); return; }
  if (e.key === 'Escape') { if (ovOpen) { closeOverview(); return; } if (fsOpen) { closeFilmstrip(); return; } if (notesOpen) { closeNotes(); return; } }
  if (ovOpen) return;
  if (['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)) { e.preventDefault(); go(idx + 1); }
  else if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); go(idx - 1); }
});

btnPrev.addEventListener('click', () => go(idx - 1));
btnNext.addEventListener('click', () => go(idx + 1));
btnFs.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); });
btnOv.addEventListener('click', toggleOverview);
btnFs2.addEventListener('click', toggleFilmstrip);
btnNotes.addEventListener('click', toggleNotes);
overview.addEventListener('click', e => { if (e.target === overview) closeOverview(); });

function sizeFrame() {
  const vw = window.innerWidth, vh = window.innerHeight, ratio = 16/9;
  const cw = vw/vh > ratio ? vh*ratio : vw, scale = cw/1280;
  slideWrapper.style.transform = `scale(${scale})`;
  slideWrapper.style.left = ((vw - 1280*scale)/2) + 'px';
  slideWrapper.style.top  = ((vh -  720*scale)/2) + 'px';
}
window.addEventListener('resize', sizeFrame);
sizeFrame();

let navHideTimer = null;
function showNav() { presoNav.classList.remove('nav-hidden'); clearTimeout(navHideTimer); navHideTimer = setTimeout(() => presoNav.classList.add('nav-hidden'), 3000); }
document.addEventListener('mousemove', showNav);
presoNav.addEventListener('mouseenter', () => clearTimeout(navHideTimer));
presoNav.addEventListener('mouseleave', showNav);
showNav();

// ── Presenter View ────────────────────────────────────────────────────────────
const PRESENTER_CHANNEL = 'ELASTIC_AGENT_BUILDER_DECK_PRESENTER';
let presenterWin = null, presenterCh = null;

function buildPresenterHTML() {
  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Presenter View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100vh;overflow:hidden;background:#0A0C12;font-family:'Inter',-apple-system,sans-serif;color:#fff}
  #root{display:flex;flex-direction:column;height:100vh}
  #top{display:flex;flex:1;min-height:0}
  #cur-wrap{flex:1;background:#111318;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;position:relative}
  #cur-label{position:absolute;top:12px;left:16px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.18)}
  #cur-inner{position:relative;width:640px;height:360px;overflow:hidden;border-radius:6px;box-shadow:0 0 0 1px rgba(255,255,255,.1)}
  #cur-frame{position:absolute;top:0;left:0;width:1280px;height:720px;border:none;transform:scale(.5);transform-origin:top left;pointer-events:none}
  #nav-row{display:flex;align-items:center;gap:10px}
  .p-nav-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;flex-shrink:0}
  .p-nav-btn:hover{background:rgba(255,255,255,.12);color:#fff}
  .p-nav-btn:disabled{opacity:.2;cursor:default}
  .p-nav-btn:disabled:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.6)}
  .p-nav-btn svg{width:14px;height:14px}
  #slide-counter{font-size:13px;font-weight:800;color:#0B5FFF;letter-spacing:.04em;padding:0 4px;min-width:56px;text-align:center}
  #right{width:320px;flex-shrink:0;background:#0D0F16;border-left:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column}
  #nxt-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}
  #nxt-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.18)}
  #nxt-inner{position:relative;width:280px;height:157px;overflow:hidden;border-radius:5px;border:1px solid rgba(255,255,255,.08)}
  #nxt-frame{position:absolute;top:0;left:0;width:1280px;height:720px;border:none;transform:scale(.21875);transform-origin:top left;pointer-events:none}
  #nxt-name{font-size:11px;color:rgba(255,255,255,.3);text-align:center;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #timer-wrap{border-top:1px solid rgba(255,255,255,.06);padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px}
  #timer{font-size:34px;font-weight:900;letter-spacing:-.02em;color:#38BDF8;cursor:pointer;user-select:none;font-variant-numeric:tabular-nums}
